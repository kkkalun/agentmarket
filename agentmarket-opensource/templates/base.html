<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentMarket{% endblock %} - AI Agent 模板聚合平台</title>
    <meta name="description" content="{% block meta_description %}AgentMarket 是领先的 AI Agent 模板聚合平台，发现、部署和管理优质 AI Agent 模板。{% endblock %}">
    <meta name="keywords" content="AI Agent, 模板, 人工智能, Agent 市场, AI 部署">
    <meta name="author" content="AgentMarket Team">
    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}AgentMarket - AI Agent 模板聚合平台{% endblock %}">
    <meta property="og:description" content="{% block og_description %}发现并部署优质 AI Agent 模板{% endblock %}">
    <meta property="og:type" content="website">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        accent: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Google Fonts: Noto Sans SC for Chinese -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col text-gray-900 dark:text-gray-100 transition-colors duration-200">
    {% include "partials/navbar.html" %}

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    <!-- Toast notification container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Global loading indicator -->
    <div id="global-loader" class="htmx-indicator fixed top-0 left-0 w-full z-50">
        <div class="h-1 bg-primary-600 animate-loading-bar"></div>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
