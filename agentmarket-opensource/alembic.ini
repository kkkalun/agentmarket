# Alembic 配置文件
# 详细信息请参考: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Alembic 脚本目录
script_location = alembic

# 迁移脚本文件名模板
# 可用变量:
#   %(rev)s - 修订版本号
#   %(slug)s - 修订描述（截断后的）
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 时区设置（用于迁移文件名中的时间戳）
# timezone =

# sqlalchemy.url 在 env.py 中动态设置
# sqlalchemy.url = driver://user:pass@localhost/dbname

# 启用异步模式
async_mode = true

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
